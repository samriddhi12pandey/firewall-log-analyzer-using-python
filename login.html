<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Firewall Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a08;font-family:'IBM Plex Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(232,160,48,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(232,160,48,0.04) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(232,160,48,0.02) 2px,rgba(232,160,48,0.02) 4px);pointer-events:none;}
.login-wrap{position:relative;z-index:1;width:100%;max-width:420px;padding:20px;}
.login-box{background:#0f0f0b;border:1px solid #2a2a1e;padding:40px 36px;position:relative;animation:box-in 0.5s ease;}
@keyframes box-in{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#e8a030,transparent);}
.logo{text-align:center;margin-bottom:32px;}
.logo-icon{width:60px;height:60px;border:2px solid #e8a030;display:inline-flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:12px;animation:pulse 2.5s ease-in-out infinite;box-shadow:0 0 20px rgba(232,160,48,0.3);}
@keyframes pulse{0%,100%{box-shadow:0 0 10px rgba(232,160,48,0.3);}50%{box-shadow:0 0 30px rgba(232,160,48,0.7);}}
.logo h1{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:4px;color:#e8a030;line-height:1;}
.logo p{font-size:10px;letter-spacing:2px;color:#5a5a42;margin-top:4px;}
.field{margin-bottom:18px;}
.field label{display:block;font-size:9px;letter-spacing:2px;color:#5a5a42;text-transform:uppercase;margin-bottom:6px;}
.field input{width:100%;background:#0a0a08;border:1px solid #2a2a1e;color:#d4d0b8;font-family:'IBM Plex Mono',monospace;font-size:13px;padding:11px 14px;outline:none;transition:border-color 0.2s;}
.field input:focus{border-color:#e8a030;}
.btn-login{width:100%;padding:13px;background:#e8a030;border:none;color:#000;font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;margin-top:6px;}
.btn-login:hover{background:#f5c842;box-shadow:0 0 20px rgba(232,160,48,0.4);}
.error{background:rgba(240,80,80,0.1);border:1px solid rgba(240,80,80,0.3);color:#f05050;font-size:11px;padding:10px 14px;margin-bottom:16px;}
.creds{margin-top:20px;padding:14px;background:#0a0a08;border:1px solid #1a1a12;font-size:10px;color:#5a5a42;line-height:1.8;}
.creds span{color:#e8a030;}
.corner{position:absolute;width:10px;height:10px;border-color:#e8a030;border-style:solid;}
.tl{top:8px;left:8px;border-width:1px 0 0 1px;} .tr{top:8px;right:8px;border-width:1px 1px 0 0;}
.bl{bottom:8px;left:8px;border-width:0 0 1px 1px;} .br{bottom:8px;right:8px;border-width:0 1px 1px 0;}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div class="logo">
      <div class="logo-icon">🛡</div>
      <h1>FIREWALL ANALYZER</h1>
      <p>NETWORK SECURITY OPERATIONS // GLA UNIVERSITY</p>
    </div>
    {% if error %}<div class="error">⚠ {{ error }}</div>{% endif %}
    <form method="POST">
      <div class="field"><label>Username</label><input type="text" name="username" placeholder="Enter username" autocomplete="off" required></div>
      <div class="field"><label>Password</label><input type="password" name="password" placeholder="Enter password" required></div>
      <button type="submit" class="btn-login">▶ ACCESS SYSTEM</button>
    </form>
    <div class="creds">Default credentials:<br>Username: <span>admin</span> &nbsp;|&nbsp; Password: <span>admin123</span></div>
  </div>
</div>
</body>
</html>
